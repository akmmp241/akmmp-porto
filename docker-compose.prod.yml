services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: akmmp-web:latest
    container_name: akmmp-web
    restart: unless-stopped
    init: true
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - shared
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

networks:
  shared:
    external: true
    name: ${EXTERNAL_NETWORK:-shared}
